<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="description" content="La Gran Biblioteca — descubre los textos de otros alquimistas en Minerva's Experiments."/>
<title>La Gran Biblioteca — Minerva's Experiments</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#fbcb70"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Minerva"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="icon" type="image/svg+xml" href="icon.svg"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500&family=Work+Sans:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-primary-fixed-variant": "#5d4200",
          "tertiary": "#decafb",
          "on-tertiary": "#382950",
          "surface-variant": "#363245",
          "inverse-surface": "#e6dff7",
          "secondary-container": "#5e4204",
          "surface-container-lowest": "#0f0c1c",
          "on-secondary-fixed": "#271900",
          "surface-container-high": "#2b2839",
          "primary": "#fbcb70",
          "error": "#ffb4ab",
          "on-secondary-fixed-variant": "#5e4204",
          "on-error-container": "#ffdad6",
          "on-error": "#690005",
          "on-surface-variant": "#d2c5b2",
          "outline-variant": "#4e4637",
          "primary-container": "#ddb058",
          "on-tertiary-fixed": "#221439",
          "surface-bright": "#3a3749",
          "secondary-fixed-dim": "#eac079",
          "on-tertiary-fixed-variant": "#4f3f68",
          "on-primary": "#412d00",
          "secondary-fixed": "#ffdea9",
          "primary-fixed-dim": "#eec066",
          "on-secondary": "#422c00",
          "on-primary-fixed": "#271900",
          "on-secondary-container": "#d7af6a",
          "inverse-primary": "#7b5801",
          "surface": "#141122",
          "tertiary-fixed-dim": "#d2beee",
          "surface-container-low": "#1c192a",
          "surface-container-highest": "#363245",
          "error-container": "#93000a",
          "tertiary-container": "#c1aede",
          "tertiary-fixed": "#ecdcff",
          "background": "#141122",
          "inverse-on-surface": "#312e40",
          "outline": "#9b8f7e",
          "secondary": "#eac079",
          "surface-tint": "#eec066",
          "primary-fixed": "#ffdea5",
          "on-background": "#e6dff7",
          "surface-container": "#201d2f",
          "on-surface": "#e6dff7",
          "on-tertiary-container": "#4f4069",
          "surface-dim": "#141122",
          "on-primary-container": "#5e4300"
        },
        fontFamily: {
          "headline": ["Noto Serif", "serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Work Sans", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .glass-artifact {
    backdrop-filter: blur(12px);
    background: rgba(43, 40, 57, 0.7);
  }
  body {
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  main {
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
  }
</style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">

<!-- Header -->
<header class="sticky top-0 z-50 border-b border-outline-variant/20 bg-gradient-to-b from-surface-container-low to-surface shadow-[0_4px_20px_rgba(0,0,0,0.6)]">
  <div class="grid grid-cols-[1fr_auto_1fr] items-center w-full px-4 pt-4 pb-2 max-w-screen-xl mx-auto">
    <div></div>
    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 active:opacity-60 transition-opacity">
      <span class="material-symbols-outlined text-primary text-2xl">science</span>
      <h1 class="text-2xl font-headline font-bold text-primary drop-shadow-[0_2px_4px_rgba(251,203,112,0.3)] tracking-tight whitespace-nowrap">Minerva's Experiments</h1>
    </a>
    <div id="auth-zone" class="flex justify-end items-center gap-1"></div>
  </div>
  <nav class="flex justify-center max-w-screen-xl mx-auto">
    <a href="index.html" class="font-label text-[10px] uppercase tracking-widest px-5 py-2.5 border-b-2 border-transparent text-on-surface-variant/50 hover:text-on-surface transition-colors">Generador</a>
    <a href="biblioteca.html" class="font-label text-[10px] uppercase tracking-widest px-5 py-2.5 border-b-2 border-primary text-primary transition-colors">Biblioteca</a>
    <a href="taller.html" class="font-label text-[10px] uppercase tracking-widest px-5 py-2.5 border-b-2 border-transparent text-on-surface-variant/50 hover:text-on-surface transition-colors">Mi Taller</a>
  </nav>
</header>

<main class="min-h-screen max-w-lg mx-auto px-4 py-8 flex flex-col gap-6">

  <!-- Page title -->
  <div class="text-center space-y-2 mt-4">
    <div class="flex items-center justify-center gap-2 text-primary">
      <span class="material-symbols-outlined text-2xl">auto_stories</span>
      <h2 class="font-headline text-2xl font-bold tracking-tight">La Gran Biblioteca</h2>
    </div>
    <p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Descubre los textos de otros alquimistas</p>
  </div>

  <!-- Marketplace -->
  <div class="flex flex-col gap-3">
    <!-- Search -->
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/40 pointer-events-none" style="font-size:16px">search</span>
      <input id="alias-search" type="search" placeholder="Buscar alquimista…"
        class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl pl-9 pr-4 py-2.5 text-on-surface text-sm font-body focus:outline-none focus:border-primary/50 placeholder:text-on-surface-variant/30"/>
    </div>
    <div class="flex items-center justify-between px-1">
      <span class="font-label text-[10px] uppercase tracking-widest text-primary font-semibold">Alquimistas</span>
      <span id="marketplace-count" class="font-label text-[10px] text-on-surface-variant"></span>
    </div>
    <div id="marketplace-list" class="rounded-xl overflow-hidden border border-outline-variant/15 glass-artifact shadow-2xl"></div>
  </div>

</main>

<!-- Footer -->
<footer class="bg-surface-container-lowest py-6 mt-10 border-t border-outline-variant/10">
  <p class="text-center font-label text-[10px] text-on-surface-variant/30 tracking-widest uppercase">Minerva's Experiments</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
<script src="biblioteca.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
